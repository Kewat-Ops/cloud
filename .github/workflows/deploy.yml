name: Deployment

#on:
  #workflow_run:
    #workflows: ["docker-build-push"]
    #types: [completed]
  #workflow_dispatch:

jobs:

  deployment:
    runs-on: self-hosted
    #if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - uses: actions/checkout@v4

  # Deployment of actual builded code or apps
      - name: deploying code
        run: |
          mkdir -p share
          echo -e "code is deploying from:\nRepository: ${{ github.repository }}"> share/deploy.log
          echo -e "\nBranch: ${{ github.ref }}">> share/deploy.log
          echo -e "\nCommit: ${{ github.sha }} ">> share/deploy.log
          echo -e "\nView-logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">> share/deploy.log

      # uploading deploy artifact
      - name: uploading deploy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deploy artifact
          path: share/deploy.log

      # pulling images latest
      - name: pulling images
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/cloud-python:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/cloud-node:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/cloud-go:latest

      # pulling stable images if exists
      - name: pulling stable images if exists
        run: |
          for SVC in python node go; do
            IMAGE=${{ secrets.DOCKER_USERNAME }}/cloud-${SVC}:stable
            if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
              docker pull "$IMAGE"
            else
              echo -e "$SVC stable image not exists\nskipping pulling stable image"
            fi
          done

      # deploying stack services
      - name: Deploying compose services
        run: |
          echo -e "clearing previous unused tags & stack services"
          #clearing previous unused tags and services
          docker stack rm devstack
          docker image prune -f
          #starting stack services
          echo -e "starting stack service "
          docker stack deploy -c docker-compose.yml devstack

# zero-downtime & automated roll back with scaling container
      - name: Automated roll back & scaling container
        run: |
          for SVC in python-service node-service go-service; do
            echo "checking $SVC service is running"
            cid=$(docker service ls --format='{{.Name}}' | grep "devstack_${SVC}" || true)
            #checking container service
            if [ -n "$cid" ]; then
              status=$(docker service ps "$cid" \
                --filter "desired-state=running" \
                --format "{{.CurrentState}}" | grep "Running" || true)

              if [ -z "$status" ]; then
                # check if tasks are still starting
                starting=$(docker service ps "$cid" --format "{{.CurrentState}}" | grep "New" || true)
                if [ -n "$starting" ]; then
                  echo "$SVC service is starting, waiting for healthcheck..."
                  sleep 30
                  continue
                fi

                # only rollback if tasks failed
                failed=$(docker service ps "$cid" --format "{{.CurrentState}}" | grep "Failed" || true)
                if [ -n "$failed" ]; then
                  echo "$SVC service failed ---> Rolling stable image"
                  BASE=${SVC%-service}
                  docker service update --image ${DOCKER_USERNAME}/cloud-${BASE}:stable "$cid"
                  docker service scale "$cid"=3
                else
                  echo "$SVC service not yet healthy, waiting..."
                fi
              else
                echo "$SVC service is healthy"
              fi
            else
              echo "$SVC service is not running"
            fi
          done



  alert:
    runs-on: ubuntu-latest
    needs: [deployment]
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: sending notification
        run: |
          echo -e "deployment failed on:\nBranch: ${{ github.ref }}"



