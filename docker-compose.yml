# for intra-services
networks:
  devops-net:
    driver: overlay
    attachable: true
    external: true

# swarms secrets for clusters/containers
secrets:
  db-password:
    external: true

services:

  python-service:
    image: ${DOCKER_USERNAME}/cloud-python:latest
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      replicas: 3
      #run container in py vm
      placement:
        constraints:
          - node.labels.role == python
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: pause
      resources:
        limits:
          cpus: "0.50"
          memory: 513M
        reservations:
          cpus: "0.35"
          memory: 356M

    networks:
      - devops-net
    secrets:
      - db-password

  node-service:
    image: ${DOCKER_USERNAME}/cloud-node:latest
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      replicas: 3
      #run container in js vm
      placement:
        constraints:
          - node.labels.role == node
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: pause
      resources:
        limits:
          cpus: "0.50"
          memory: 513M
        reservations:
          cpus: "0.35"
          memory: 356M

    networks:
      - devops-net
    secrets:
      - db-password

  go-service:
    image: ${DOCKER_USERNAME}/cloud-go:latest
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      replicas: 3
      #run container in go vm
      placement:
        constraints:
          - node.labels.role == go
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: pause
      resources:
        limits:
          cpus: "0.50"
          memory: 513M
        reservations:
          cpus: "0.35"
          memory: 356M

    networks:
      - devops-net
    secrets:
      - db-password

  nginx-proxy:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      placement:
        constraints:
          - node.labels.role == python
    networks:
      - devops-net
    secrets:
      - db-password


  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    deploy:
      placement:
        constraints:
          - node.labels.role == python
    networks:
      - devops-net

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    networks:
      - devops-net

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "6831:6831/udp"
    networks:
      - devops-net
